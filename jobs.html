<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Jobs — Hirex</title>
  <meta name="description" content="Browse 37+ jobs in engineering, design, product, marketing, finance, and more. Filter by category, type, remote, level, and salary." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
</head>
<body>

<!-- HEADER -->
<header class="header" role="banner">
  <div class="container">
    <div class="header__inner">
      <a href="index.html" class="header__logo">
        <div class="header__logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div>
        <span class="header__logo-text">Hire<span>x</span></span>
      </a>
      <nav class="header__nav">
        <a href="index.html"      class="nav-link">Home</a>
        <a href="jobs.html"       class="nav-link active">Find Jobs</a>
        <a href="saved-jobs.html" class="nav-link">Saved Jobs</a>
      </nav>
      <div class="header__actions">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme"><span id="theme-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></span></button>
        <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Open menu" aria-expanded="false"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      </div>
    </div>
  </div>
  <nav id="mobile-nav" class="mobile-nav container">
    <a href="index.html" class="nav-link">Home</a>
    <a href="jobs.html" class="nav-link">Find Jobs</a>
    <a href="saved-jobs.html" class="nav-link">Saved Jobs</a>
  </nav>
</header>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="container">
    <h1 style="font-size:clamp(1.6rem,3vw,2.25rem);margin-bottom:8px">Browse Jobs</h1>
    <p style="color:var(--text-secondary);font-size:.95rem">Explore opportunities from top companies across every industry.</p>
  </div>
</div>

<!-- JOBS PAGE MAIN -->
<div class="container section-sm">

  <!-- Active filters -->
  <div id="active-filters" class="active-filters" aria-label="Active filters" role="list"></div>

  <!-- Search bar -->
  <div style="margin-bottom:20px;position:relative">
    <div class="input-with-icon">
      <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" class="input" type="text" placeholder="Search by title, company, skill, or location…" autocomplete="off" aria-label="Search jobs" style="border-radius:var(--r-full);padding-left:42px" />
    </div>
  </div>

  <!-- Mobile filter toggle -->
  <button id="mobile-filter-btn" class="btn btn-secondary btn-sm" style="display:none;margin-bottom:12px" aria-controls="filter-sidebar">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/></svg>
    Filters
  </button>

  <div class="jobs-layout">

    <!-- FILTER SIDEBAR -->
    <aside id="filter-sidebar" aria-label="Job filters">
      <div class="filter-sidebar-sticky">
        <div class="filter-sidebar-wrap">
          <div class="filter-sidebar-header">
            <span style="font-size:.9rem;font-weight:700">Filters</span>
            <button id="clear-filters-btn" class="btn btn-ghost btn-sm" style="font-size:.75rem;padding:4px 10px">Clear all</button>
          </div>

          <!-- Category -->
          <div class="filter-section">
            <div class="filter-section__header">
              <span class="filter-section__title">Category</span>
              <svg class="filter-section__toggle" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="filter-section__body collapsible-body">
              <label class="checkbox-label"><input type="checkbox" data-filter-category value="Engineering"> Engineering</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-category value="Design"> Design</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-category value="Marketing"> Marketing</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-category value="Product"> Product</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-category value="Finance"> Finance</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-category value="Data"> Data & Analytics</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-category value="HR"> HR</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-category value="Operations"> Operations</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-category value="Sales"> Sales</label>
            </div>
          </div>

          <!-- Job Type -->
          <div class="filter-section">
            <div class="filter-section__header">
              <span class="filter-section__title">Job Type</span>
              <svg class="filter-section__toggle" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="filter-section__body collapsible-body">
              <label class="checkbox-label"><input type="checkbox" data-filter-type value="full-time"> Full-time</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-type value="part-time"> Part-time</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-type value="contract"> Contract</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-type value="internship"> Internship</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-type value="freelance"> Freelance</label>
            </div>
          </div>

          <!-- Work Mode -->
          <div class="filter-section">
            <div class="filter-section__header">
              <span class="filter-section__title">Work Mode</span>
              <svg class="filter-section__toggle" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="filter-section__body collapsible-body">
              <label class="checkbox-label"><input type="checkbox" data-filter-remote value="remote"> Remote</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-remote value="hybrid"> Hybrid</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-remote value="onsite"> On-site</label>
            </div>
          </div>

          <!-- Experience Level -->
          <div class="filter-section">
            <div class="filter-section__header">
              <span class="filter-section__title">Experience Level</span>
              <svg class="filter-section__toggle" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="filter-section__body collapsible-body">
              <label class="checkbox-label"><input type="checkbox" data-filter-level value="entry"> Entry Level</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-level value="mid"> Mid Level</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-level value="senior"> Senior</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-level value="lead"> Lead / Staff</label>
              <label class="checkbox-label"><input type="checkbox" data-filter-level value="executive"> Executive</label>
            </div>
          </div>

          <!-- Salary Range -->
          <div class="filter-section">
            <div class="filter-section__header">
              <span class="filter-section__title">Salary Range</span>
              <svg class="filter-section__toggle" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
            </div>
            <div class="filter-section__body collapsible-body">
              <div id="salary-display" style="font-size:.82rem;font-weight:600;color:var(--success);margin-bottom:10px">$0 – $500k</div>
              <div style="display:flex;flex-direction:column;gap:10px">
                <div>
                  <div style="font-size:.72rem;color:var(--text-muted);margin-bottom:5px">Minimum</div>
                  <input id="salary-min" type="range" class="range-slider" min="0" max="300" step="10" value="0" aria-label="Minimum salary" />
                </div>
                <div>
                  <div style="font-size:.72rem;color:var(--text-muted);margin-bottom:5px">Maximum</div>
                  <input id="salary-max" type="range" class="range-slider" min="0" max="500" step="10" value="500" aria-label="Maximum salary" />
                </div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </aside>

    <!-- JOBS MAIN -->
    <main id="jobs-main">
      <div class="jobs-toolbar">
        <div id="jobs-count" class="jobs-toolbar__count" aria-live="polite">Loading jobs…</div>
        <div style="display:flex;align-items:center;gap:8px">
          <label for="sort-select" class="text-sm text-secondary">Sort:</label>
          <select id="sort-select" class="select" style="width:auto;padding:8px 32px 8px 12px;font-size:.82rem" aria-label="Sort jobs">
            <option value="newest">Newest</option>
            <option value="oldest">Oldest</option>
            <option value="salary-high">Salary: High to Low</option>
            <option value="salary-low">Salary: Low to High</option>
            <option value="relevance">Featured First</option>
          </select>
        </div>
      </div>

      <div id="jobs-grid" class="jobs-grid" role="list" aria-label="Job listings"></div>
      <div id="jobs-pagination" aria-label="Pagination"></div>
    </main>

  </div>
</div>

<!-- FOOTER -->
<footer class="footer" role="contentinfo">
  <div class="container">
    <div class="footer__bottom" style="margin-top:0;padding-top:var(--sp-6)">
      <div class="footer__copy">© 2026 Hirex. All rights reserved.</div>
      <div style="display:flex;gap:16px">
        <a href="index.html" class="footer__link">Home</a>
        <a href="jobs.html" class="footer__link">Jobs</a>
        <a href="saved-jobs.html" class="footer__link">Saved</a>
      </div>
    </div>
  </div>
</footer>

<script src="js/jobs-data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/render.js"></script>
<script src="js/filters.js"></script>
<script src="js/app-jobs.js"></script>
<script>
  // Show mobile filter btn on small screens
  if (window.innerWidth <= 900) {
    document.getElementById('mobile-filter-btn').style.display = 'inline-flex';
    document.getElementById('filter-sidebar').classList.add('hidden');
  }
</script>
</body>
</html>
