<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Job Detail — Hirex</title>
  <meta name="description" content="View full job details, requirements, benefits, and apply on Hirex." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/layout.css" />
</head>
<body>

<!-- HEADER -->
<header class="header" role="banner">
  <div class="container">
    <div class="header__inner">
      <a href="index.html" class="header__logo">
        <div class="header__logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg></div>
        <span class="header__logo-text">Hire<span>x</span></span>
      </a>
      <nav class="header__nav">
        <a href="index.html"      class="nav-link">Home</a>
        <a href="jobs.html"       class="nav-link">Find Jobs</a>
        <a href="saved-jobs.html" class="nav-link">Saved Jobs</a>
      </nav>
      <div class="header__actions">
        <button id="theme-toggle" class="theme-toggle" aria-label="Toggle theme"><span id="theme-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg></span></button>
        <button id="mobile-menu-btn" class="mobile-menu-btn" aria-label="Open menu" aria-expanded="false"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
      </div>
    </div>
  </div>
  <nav id="mobile-nav" class="mobile-nav container">
    <a href="index.html" class="nav-link">Home</a>
    <a href="jobs.html" class="nav-link">Find Jobs</a>
    <a href="saved-jobs.html" class="nav-link">Saved Jobs</a>
  </nav>
</header>

<!-- BREADCRUMB -->
<div style="background:var(--bg-secondary);border-bottom:1px solid var(--border);padding:12px 0">
  <div class="container">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="index.html">Home</a>
      <span class="breadcrumb__sep">/</span>
      <a href="jobs.html">Jobs</a>
      <span class="breadcrumb__sep">/</span>
      <span class="breadcrumb__current" id="breadcrumb-job">Job Detail</span>
    </nav>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="container">
  <div class="detail-layout">

    <!-- LEFT: Job Main -->
    <main id="detail-main">
      <!-- Job Header -->
      <div id="job-header" class="anim-fade-up" style="padding:var(--sp-6) 0 var(--sp-6)"></div>

      <!-- Job Description card -->
      <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-8);margin-bottom:var(--sp-6)">
        <div id="job-description" class="anim-fade-up delay-1"></div>
      </div>
    </main>

    <!-- RIGHT: Sidebar -->
    <aside class="detail-sidebar anim-slide-right">

      <!-- Apply card -->
      <div class="detail-card">
        <a id="apply-btn" href="#" class="btn btn-primary w-full btn-lg" style="justify-content:center;margin-bottom:12px;text-align:center">
          Apply Now →
        </a>
        <div style="display:flex;gap:8px">
          <button id="save-job-btn" class="btn btn-secondary" style="flex:1;justify-content:center">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
            Save Job
          </button>
          <button id="share-copy-btn" class="btn btn-secondary btn-icon" title="Copy link">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
          </button>
        </div>
        <p style="font-size:.72rem;color:var(--text-muted);text-align:center;margin-top:10px">🔒 Your info is kept private and secure</p>
      </div>

      <!-- Job Info -->
      <div class="detail-card">
        <div class="detail-card__title">Job Details</div>
        <div id="job-info-card"></div>
      </div>

      <!-- Company card -->
      <div class="detail-card">
        <div class="detail-card__title">About the Company</div>
        <div id="company-card"></div>
      </div>

      <!-- Similar Jobs -->
      <div class="detail-card">
        <div class="detail-card__title">Similar Jobs</div>
        <div id="similar-jobs" style="display:flex;flex-direction:column;gap:8px"></div>
      </div>

    </aside>
  </div>
</div>

<!-- FOOTER -->
<footer class="footer" role="contentinfo">
  <div class="container">
    <div class="footer__bottom" style="margin-top:0;padding-top:var(--sp-6)">
      <div class="footer__copy">© 2026 Hirex. All rights reserved.</div>
      <div style="display:flex;gap:16px">
        <a href="index.html" class="footer__link">Home</a>
        <a href="jobs.html" class="footer__link">Jobs</a>
        <a href="saved-jobs.html" class="footer__link">Saved</a>
      </div>
    </div>
  </div>
</footer>

<script src="js/jobs-data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/render.js"></script>
<script src="js/app-detail.js"></script>
</body>
</html>
