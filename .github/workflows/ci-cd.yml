# =============================================================
#  HIREX JOB BOARD — CI/CD Pipeline
#  Triggers : push to main, pull_request to main
#  Jobs     :
#    1. lint-validate  — HTML validation + JS/CSS linting
#    2. preview        — Deploy preview to Vercel (PRs only)
#    3. deploy         — Deploy production to Vercel (main only)
# =============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write   # allows posting preview URLs as PR comments

# ─────────────────────────────────────────
#  JOB 1 — Lint & Validate
# ─────────────────────────────────────────
jobs:
  lint-validate:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install linting tools
        run: |
          npm install --save-dev \
            html-validate \
            stylelint \
            stylelint-config-standard \
            eslint \
            @eslint/js

      - name: 🧱 Validate HTML
        run: npx html-validate "*.html" --config .htmlvalidate.json

      - name: 🎨 Lint CSS
        run: npx stylelint "css/**/*.css" --config .stylelintrc.json

      - name: ⚡ Lint JavaScript
        run: npx eslint "js/**/*.js" --config eslint.config.js --max-warnings 0

      - name: 🔗 Check internal links
        run: |
          echo "Checking internal links in HTML files..."
          MISSING=0
          for html in *.html; do
            links=$(grep -oP 'href="\K[^"#?]+(?=[^"]*")' "$html" | grep -v '^http' | grep -v '^mailto' | grep -v '^#' || true)
            for link in $links; do
              if [ ! -f "$link" ]; then
                echo "❌  $html → '$link' NOT FOUND"
                MISSING=$((MISSING+1))
              else
                echo "✅  $html → '$link'"
              fi
            done
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "Found $MISSING broken link(s)."
            exit 1
          fi
          echo "All internal links are valid ✅"

      - name: ✅ All checks passed
        run: echo "Lint & validation complete — safe to deploy."

# ─────────────────────────────────────────
#  JOB 2 — Vercel Preview (Pull Requests)
# ─────────────────────────────────────────
  preview:
    name: 🔎 Vercel Preview Deploy
    runs-on: ubuntu-latest
    needs: lint-validate
    if: github.event_name == 'pull_request'

    env:
      VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 🔗 Pull Vercel environment info
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy preview to Vercel
        id: deploy-preview
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "PREVIEW_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $DEPLOY_URL"

      - name: 💬 Post preview URL as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy-preview.outputs.PREVIEW_URL }}';
            const body = [
              '## 🚀 Vercel Preview Deployment',
              '',
              `| | |`,
              `|---|---|`,
              `| **Preview URL** | [${previewUrl}](${previewUrl}) |`,
              `| **Status**      | ✅ Ready |`,
              `| **Commit**      | \`${{ github.sha }}\` |`,
              '',
              '_This preview will be promoted to production when the PR is merged._'
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

# ─────────────────────────────────────────
#  JOB 3 — Vercel Production (main branch)
# ─────────────────────────────────────────
  deploy:
    name: 🌐 Vercel Production Deploy
    runs-on: ubuntu-latest
    needs: lint-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    env:
      VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Install Vercel CLI
        run: npm install --global vercel@latest

      - name: 🔗 Pull Vercel environment info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🏗️ Build project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: 🚀 Deploy to Vercel Production
        id: deploy-prod
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "PRODUCTION_URL=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Production URL: $DEPLOY_URL"

      - name: 🎉 Deployment Summary
        run: |
          echo "========================================================"
          echo "  ✅ Hirex deployed to Vercel Production!"
          echo "  🌐 URL: ${{ steps.deploy-prod.outputs.PRODUCTION_URL }}"
          echo "  📦 Commit: ${{ github.sha }}"
          echo "  👤 Author: ${{ github.actor }}"
          echo "========================================================"
