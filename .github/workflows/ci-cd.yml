# =============================================================
#  HIREX JOB BOARD — CI/CD Pipeline
#  Triggers: push to main, pull_request to main
#  Jobs:
#    1. lint-validate  — HTML validation + JS/CSS linting
#    2. deploy         — GitHub Pages deployment (main only)
# =============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Allow GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel queued runs if a new one starts
concurrency:
  group: pages
  cancel-in-progress: true

# ─────────────────────────────────────────
#  JOB 1 — Lint & Validate
# ─────────────────────────────────────────
jobs:
  lint-validate:
    name: 🔍 Lint & Validate
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # 2. Set up Node.js for linting tools
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 3. Install linting dependencies
      - name: 📦 Install linting tools
        run: |
          npm install --save-dev \
            html-validate \
            stylelint \
            stylelint-config-standard \
            eslint \
            @eslint/js

      # 4. Validate HTML files
      - name: 🧱 Validate HTML
        run: |
          npx html-validate \
            "*.html" \
            --config .htmlvalidate.json
        continue-on-error: false

      # 5. Lint CSS files
      - name: 🎨 Lint CSS
        run: |
          npx stylelint "css/**/*.css" \
            --config .stylelintrc.json
        continue-on-error: false

      # 6. Lint JavaScript files
      - name: ⚡ Lint JavaScript
        run: |
          npx eslint "js/**/*.js" \
            --config eslint.config.js \
            --max-warnings 0
        continue-on-error: false

      # 7. Check for broken internal links (relative hrefs)
      - name: 🔗 Check internal links
        run: |
          echo "Checking internal links in HTML files..."
          MISSING=0
          for html in *.html; do
            # Extract href values that look like local files
            links=$(grep -oP 'href="\K[^"#?]+(?=[^"]*")' "$html" | grep -v '^http' | grep -v '^mailto' | grep -v '^#' || true)
            for link in $links; do
              if [ ! -f "$link" ]; then
                echo "❌  $html → '$link' NOT FOUND"
                MISSING=$((MISSING+1))
              else
                echo "✅  $html → '$link'"
              fi
            done
          done
          if [ "$MISSING" -gt 0 ]; then
            echo ""
            echo "Found $MISSING broken link(s). Fix them before merging."
            exit 1
          fi
          echo ""
          echo "All internal links are valid ✅"

      # 8. Summary
      - name: ✅ Lint Summary
        if: success()
        run: |
          echo "========================================"
          echo "  All checks passed! Ready to deploy."
          echo "========================================"

# ─────────────────────────────────────────
#  JOB 2 — Deploy to GitHub Pages
#  (Only runs on push to main after CI passes)
# ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: lint-validate          # only deploy if lint passes
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # 1. Checkout
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      # 2. Configure GitHub Pages
      - name: 🛠️ Setup GitHub Pages
        uses: actions/configure-pages@v5

      # 3. Upload the entire repo as a Pages artifact
      - name: 📤 Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the whole project root (static site)
          path: '.'

      # 4. Deploy!
      - name: 🌐 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 5. Print live URL
      - name: 🎉 Deployment complete
        run: |
          echo "========================================"
          echo "  Site deployed!"
          echo "  URL: ${{ steps.deployment.outputs.page_url }}"
          echo "========================================"
